services:
  # Next.js Fullstack Application (Supabase handles DB/Auth/Storage)
  - type: web
    name: rov-sn-tournament
    env: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
